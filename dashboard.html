<!DOCTYPE html>
<head>
    <title>HealthCare Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    
</head>
<body>
    <nav>
        <img src="assets/TestLogo.svg">
        
        <ul class="nav-buttons">
            <li>
                <img src="assets/HomeIcon.svg">
                Overview
            </li>
            <li class="active">
                <img src="assets/GroupIcon.svg">
                Patients
            </li>
            <li>
                <img src="assets/CalendarIcon.svg">
                Schedule
            </li>
            <li>
                <img src="assets/BubbleIcon.svg">
                Message
            </li>
            <li>
                <img src="assets/CardIcon.svg">
                Transaction
            </li>

        </ul>
        <div class="profile">
            <img src="assets/ProfilePicture.png">
            <div class="text">
                <div>
                    Dr. Jose Simmons
                </div>
                <div>
                    General Practitioner
                </div>
            </div>
            <div class="line"></div>
            <div class="icons">
                <img src="assets/GearIcon.svg">
            </div>
            <div class="icons">
            <img src="assets/VertIcon.svg">
            </div>
        </div>
    </nav>

    <div class="main">
        <div class="patients">
            <div class="patients-header">
                    Patients
                    <img src="/assets/SearchIcon.svg">
            </div>
            <div class="patients-list"></div>
        </div>

        <div class="diagnostic">
            <div>
                Diagnosis History
            </div>
            <div>
                Diagnostic List
            </div>
        </div>

        <div class="patient">
            <div class="patient-top">
                <div class="patient-header">
                    <div class="profile-picture"></div>
                    <div class="patient-name"></div>
                </div>
                <div>
                    <img>
                    <div class="patient-info">
                        <img class="patient-icon" src="/assets/BirthIcon.svg">
                        <div>
                            <div>Date Of Birth</div>
                            <div class="date-of-birth"></div>
                        </div>
                    </div>
                    <div class="patient-info">
                        <img class="patient-icon" src="/assets/FemaleIcon.svg">
                        <div>
                            <div>Gender</div>
                            <div class="gender"></div>
                        </div>
                    </div>
                    <div class="patient-info">
                        <img class="patient-icon" src="/assets/PhoneIcon.svg">
                        <div>
                            <div>Contact Info.</div>
                            <div class="phone-number"></div>
                        </div>
                    </div>
                    <div class="patient-info">
                        <img class="patient-icon" src="/assets/PhoneIcon.svg">
                        <div>
                            <div>Emergency Contacts</div>
                            <div class="emergency-contact"></div>
                        </div>
                    </div>
                    <div class="patient-info">
                        <img class="patient-icon" src="/assets/InsuranceIcon.svg">
                        <div>
                            <div>Insurance Provider</div>
                            <div class="insurance-type"></div>
                        </div>
                    </div>
                </div>
                <div class="patient-footer">Show All Information</div>
            </div>
            <div class="patient-bottom">
                <div class="lab-result">Lab Result</div>
            </div>
        </div>
    </div>

    <script>

        let username = 'coalition';
        let password = 'skills-test';
        let auth = btoa(`${username}:${password}`);
        let patients;
        
        fetch("https://fedskillstest.coalitiontechnologies.workers.dev/", {
            headers: {
                'Authorization' : `Basic ${auth}`
            }
        })
        .then(response => response.json())
        .then(data => {
            patients = data;
            
            
            document.querySelector('.patients-list').innerHTML = patients.map(patient => `
                <div class="patient-card">
                    <div class="patient-card-left">
                        <img class="patient-picture" src="${patient.profile_picture}">
                        <div>
                            <div class="name">${patient.name}</div>
                            <div class="gender-age">${patient.gender}, ${patient.age}</div>
                        </div>
                    </div>
                    <img src="/assets/HoriIcon.svg">
                </div>
            `).join('');

            document.querySelector('.profile-picture').innerHTML = `<img src="${patients[3].profile_picture}">`;
            document.querySelector('.patient-name').innerHTML = `<div>${patients[3].name}</div>`;
            document.querySelector('.date-of-birth').innerHTML = `<div class="patient-text">${patients[3].date_of_birth}<div>`;
            document.querySelector('.gender').innerHTML = `<div class="patient-text">${patients[3].gender}</div>`;
            document.querySelector('.phone-number').innerHTML = `<div class="patient-text">${patients[3].phone_number}</div>`;
            document.querySelector('.emergency-contact').innerHTML = `<div class="patient-text">${patients[3].emergency_contact}</div>`;
            document.querySelector('.insurance-type').innerHTML = `<div class="patient-text">${patients[3].insurance_type}</div>`;
            
        })
        .catch(error => console.error(error));

        
        
        
    </script>

    

</body>
